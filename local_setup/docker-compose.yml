version: '3'

services:
  # Nginx proxy for single tunnel
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - bolna-app
      - twilio-app

  # main bolna service
  bolna-app:
    build:
      context: .
      dockerfile: dockerfiles/bolna_server.Dockerfile
    image: bolna-app:latest
    ports:
      - "5011:5001"
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ../agent_data:/app/agent_data

  # redis service used as a persistent storage
  redis:
    image: redis:latest
    ports:
      - "6380:6379"

  # ngrok for local tunneling
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./ngrok-config.yml:/etc/ngrok.yml
    ports:
      - 4040:4040

  ### Telephony servers ###
  twilio-app:
    build:
      context: .
      dockerfile: dockerfiles/twilio_server.Dockerfile
    image: twilio-app:latest
    ports:
      - "8011:8001"
    depends_on:
      - redis
      - ngrok
      - bolna-app
    env_file:
      - .env
    volumes:
      - ./telephony_server/twilio_api_server.py:/app/twilio_api_server.py

  plivo-app:
    build:
      context: .
      dockerfile: dockerfiles/plivo_server.Dockerfile
    image: plivo-app:latest
    ports:
      - "8012:8002"
    depends_on:
      - redis
      - ngrok
      - bolna-app
    env_file:
      - .env
